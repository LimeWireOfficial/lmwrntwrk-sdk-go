name: Release Check

on:
  push:
    tags:
      - 'v*'

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [ '1.22', '1.23', '1.24' ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "Error: go.mod or go.sum is not tidy. Run 'go mod tidy' locally."
            exit 1
          fi

      - name: Ensure no local 'replace' directives
        run: |
          if grep -q "replace " go.mod; then
            echo "Error: 'replace' directive found in go.mod. Remove it before tagging."
            exit 1
          fi

      - name: Run Tests with Race Detector
        run: go test -v -race ./...

      - name: Verify version matches git tag
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          SDK_VERSION=$(grep 'var SDKVersion =' internal/version/version.go | cut -d '"' -f 2)
          if [ "$TAG_VERSION" != "$SDK_VERSION" ]; then
            echo "Error: Git tag v$TAG_VERSION does not match SDKVersion $SDK_VERSION in internal/version/version.go"
            exit 1
          fi
